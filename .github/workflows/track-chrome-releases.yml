name: Track Chrome Releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-chrome-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [Stable, Beta]
        platform: [Windows, Mac]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Chrome version
        id: chrome
        run: |
          RESPONSE=$(curl -s "https://chromiumdash.appspot.com/fetch_releases?channel=${{ matrix.channel }}&platform=${{ matrix.platform }}&num=1")
          VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['version']) if data else sys.exit(1)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read last known version
        id: last
        run: |
          FILE="versions/chrome-${{ matrix.channel }}-${{ matrix.platform }}.txt"
          if [ -f "$FILE" ]; then
            echo "version=$(cat $FILE)" >> $GITHUB_OUTPUT
          else
            echo "version=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.chrome.outputs.version }}" != "${{ steps.last.outputs.version }}" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        if: steps.compare.outputs.new_release == 'true'
        run: |
          mkdir -p versions
          FILE="versions/chrome-${{ matrix.channel }}-${{ matrix.platform }}.txt"
          echo "${{ steps.chrome.outputs.version }}" > "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: Chrome ${{ matrix.channel }} (${{ matrix.platform }}) → ${{ steps.chrome.outputs.version }}"
          git pull --rebase
          git push

      - name: Mark as updated
        if: steps.compare.outputs.new_release == 'true'
        run: |
          mkdir -p updates
          echo "${{ steps.chrome.outputs.version }}" > "updates/${{ matrix.channel }}-${{ matrix.platform }}.txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/
          git commit -m "track: mark ${{ matrix.channel }} ${{ matrix.platform }} as updated" || true
          git pull --rebase
          git push

      - name: Create GitHub Release
        if: steps.compare.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chrome-${{ matrix.channel }}-${{ matrix.platform }}-${{ steps.chrome.outputs.version }}
          name: "Chrome ${{ matrix.channel }} ${{ matrix.platform }} ${{ steps.chrome.outputs.version }}"
          body: |
            🚀 New Chrome release detected!
            **Channel:** ${{ matrix.channel }}
            **Platform:** ${{ matrix.platform }}
            **Version:** `${{ steps.chrome.outputs.version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  send-summary-email:
    runs-on: ubuntu-latest
    needs: check-chrome-release
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if any updates happened
        id: check
        run: |
          if [ -d "updates" ] && [ "$(ls -A updates)" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Build email body
        id: email
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BODY="Chrome versions have been updated!

UPDATED:"
          for FILE in updates/*.txt; do
            NAME=$(basename "$FILE" .txt)
            CHANNEL=$(echo "$NAME" | cut -d'-' -f1)
            PLATFORM=$(echo "$NAME" | cut -d'-' -f2)
            VERSION=$(cat "$FILE")
            BODY+="
  ★ $CHANNEL / $PLATFORM → $VERSION"
          done
          BODY+="

ALL CURRENT VERSIONS:"
          for FILE in versions/*.txt; do
            NAME=$(basename "$FILE" .txt)
            CHANNEL=$(echo "$NAME" | sed 's/chrome-//' | cut -d'-' -f1)
            PLATFORM=$(echo "$NAME" | sed 's/chrome-//' | cut -d'-' -f2)
            VERSION=$(cat "$FILE")
            if ls updates/ | grep -q "${CHANNEL}-${PLATFORM}"; then
              BODY+="
  ★ $CHANNEL / $PLATFORM: $VERSION  ← UPDATED"
            else
              BODY+="
    $CHANNEL / $PLATFORM: $VERSION"
            fi
          done
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Send email to Teams channel
        if: steps.check.outputs.has_updates == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🌐 Chrome Release Update"
          to: ${{ secrets.TEAMS_EMAIL }}
          from: Chrome Release Tracker
          body: ${{ steps.email.outputs.body }}

      - name: Clear updates folder
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f updates/*.txt
          git add updates/
          git commit -m "chore: clear updates folder after notification sent" || true
          git push
