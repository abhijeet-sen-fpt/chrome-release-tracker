name: Track Chrome Releases

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-chrome-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Chrome version
        id: chrome
        run: |
          VERSION=$(curl -s "https://chromiumdash.appspot.com/fetch_releases?channel=Stable&platform=Linux&num=1" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Stable Chrome version: $VERSION"

      - name: Read last known version
        id: last
        run: |
          if [ -f chrome-version.txt ]; then
            echo "version=$(cat chrome-version.txt)" >> $GITHUB_OUTPUT
          else
            echo "version=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.chrome.outputs.version }}" != "${{ steps.last.outputs.version }}" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        if: steps.compare.outputs.new_release == 'true'
        run: |
          echo "${{ steps.chrome.outputs.version }}" > chrome-version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chrome-version.txt
          git commit -m "chore: Chrome updated to ${{ steps.chrome.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: steps.compare.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: chrome-${{ steps.chrome.outputs.version }}
          name: "Chrome ${{ steps.chrome.outputs.version }}"
          body: |
            🚀 New stable Chrome release detected!
            **Version:** `${{ steps.chrome.outputs.version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
